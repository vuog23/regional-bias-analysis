project:
  name: geode_finetune
  dataset_name: GeoDE
  seed: 42

paths:
  # D:\Project\DAP_paper\datasets\processed\DollarStreet
  data_root: D:/Project/DAP_paper/datasets/processed/GeoDE

  train_dir: null
  val_dir: null
  test_dir: null

  train_split: train
  val_split: val
  test_split: test

  output_dir: D:/Project/DAP_paper/results/geode/convnext

model:
  # swinv2_base, deit3_base, dinov2_vitb14, resnet50_base,
  # clip_vitb16, mae_vitb16, siglip_vitb16, maxvit_base
  key: convnextv2_base
  name: null

  pretrained: true
  num_classes: null
  drop_path_rate: 0.1
  data_parallel: false

transforms:
  image_size: 224
  random_resized_crop_scale: [0.7, 1.0]
  horizontal_flip_p: 0.5
  color_jitter: [0.3, 0.3, 0.3, 0.3]
  random_grayscale_p: 0.1
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

training:
  epochs: 10
  batch_size: 32
  num_workers: 4

  optimizer: adam
  lr: 0.00003
  weight_decay: 0.0
  label_smoothing: 0.1

  scheduler: cosine
  t_max: null
  eta_min: 0.000001

  amp: true
  device: auto
  save_last: true
  test_after_train: true

  resume: null
  test_only: false
