project:
  name: geode_finetune
  dataset_name: GeoDE
  seed: 42
paths:
  data_root: /workspace/data/GeoDE_split
  train_dir: null
  val_dir: null
  test_dir: null
  train_split: train
  val_split: val
  test_split: test
  output_dir: /workspace/output
model:
  key: deit3_base
  name: null
  pretrained: true
  num_classes: null
  drop_path_rate: 0.1
  data_parallel: false
transforms:
  image_size: 224
  random_resized_crop_scale:
  - 0.7
  - 1.0
  horizontal_flip_p: 0.5
  color_jitter:
  - 0.3
  - 0.3
  - 0.3
  - 0.3
  random_grayscale_p: 0.1
  normalize_mean:
  - 0.485
  - 0.456
  - 0.406
  normalize_std:
  - 0.229
  - 0.224
  - 0.225
training:
  epochs: 10
  batch_size: 32
  num_workers: 4
  optimizer: adam
  lr: 3.0e-05
  weight_decay: 0.0
  label_smoothing: 0.1
  scheduler: cosine
  t_max: null
  eta_min: 1.0e-06
  amp: true
  device: auto
  save_last: true
  test_after_train: true
  resume: null
  test_only: false
